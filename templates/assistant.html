{% extends "base.html" %}

{% block title %}Smart Assistant{% endblock %}

{% block content %}

<style>
.assistant-wrapper {
    max-width: 900px;
    margin: auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.chat-container {
    height: 70vh;
    display: flex;
    flex-direction: column;
    border-radius: 22px;
    overflow: hidden;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255,255,255,0.15);
    backdrop-filter: blur(18px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

.welcome-box {
    padding: 16px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.04);
}

.welcome-box h3 {
    margin-bottom: 6px;
    color: #ffffff;
}

.welcome-box p {
    margin: 0;
    color: #cbd5e1;
    font-size: 14px;
}

.chat-box {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.message {
    max-width: 70%;
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.4;
}

.user {
    align-self: flex-end;
    background: linear-gradient(135deg, #3b82f6, #60a5fa);
    color: white;
}

.bot {
    align-self: flex-start;
    background: rgba(255,255,255,0.15);
    color: white;
}

.chat-input {
    display: flex;
    padding: 15px;
    gap: 10px;
    border-top: 1px solid rgba(255,255,255,0.15);
}

.chat-input input {
    flex: 1;
    padding: 12px;
    border-radius: 12px;
    border: none;
    background: rgba(255,255,255,0.1);
    color: white;
}

.chat-input input::placeholder {
    color: #cbd5e1;
}

.chat-input button {
    padding: 12px 20px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #ff7f6a, #ff9a85);
    color: white;
    font-weight: 600;
    cursor: pointer;
}

.chat-box::-webkit-scrollbar {
    width: 6px;
}

.chat-box::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.2);
    border-radius: 10px;
}
</style>

<div class="assistant-wrapper">

    <h1>Smart Assistant</h1>

    <div class="chat-container">
        <div class="welcome-box">
            <h3>Welcome 👋</h3>
            <p>
                Ask about your income, expenses, balance, monthly summary, savings, budget usage,
                or highest spending category.
            </p>
        </div>

        <div id="chat-box" class="chat-box"></div>

        <div class="chat-input">
            <input id="question" placeholder="Ask something..." />
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

</div>

<script>
const chatBox = document.getElementById("chat-box");

function addMessage(text, type) {
    const msg = document.createElement("div");
    msg.className = "message " + type;
    msg.innerText = text;
    chatBox.appendChild(msg);
    chatBox.scrollTop = chatBox.scrollHeight;
}

window.onload = function () {
    addMessage("Hello! I’m your Smart Assistant. Ask me anything about your finances.", "bot");
};

function sendMessage() {
    const input = document.getElementById("question");
    const message = input.value.trim();
    if (!message) return;

    addMessage(message, "user");
    input.value = "";

    const typing = document.createElement("div");
    typing.className = "message bot";
    typing.innerText = "Typing...";
    chatBox.appendChild(typing);
    chatBox.scrollTop = chatBox.scrollHeight;

    fetch("/ask", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "question=" + encodeURIComponent(message)
    })
    .then(res => res.text())
    .then(data => {
        typing.remove();
        addMessage(data, "bot");
    });
}

document.getElementById("question").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        sendMessage();
    }
});
</script>

{% endblock %}
