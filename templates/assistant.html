{% extends "base.html" %}

{% block title %}Assistant - Smart Budget Tracker{% endblock %}

{% block content %}
<h1>Smart Assistant</h1>

<div class="assistant-box">

    <div class="chat-box" id="chatBox">
        <div class="bot-message">
            Hello 👋 Ask me about your income, expense, balance, or monthly summary.
        </div>
    </div>

    <form id="chatForm">
        <input type="text" id="question" placeholder="Ask something..." required>
        <button type="submit">Send</button>
    </form>

</div>

<script>
    const form = document.getElementById("chatForm");
    const chatBox = document.getElementById("chatBox");

    form.addEventListener("submit", function(e) {
        e.preventDefault();

        const input = document.getElementById("question");
        const question = input.value.trim();

        if (!question) return;

        const userMsg = document.createElement("div");
        userMsg.className = "user-message";
        userMsg.textContent = question;
        chatBox.appendChild(userMsg);

        chatBox.scrollTop = chatBox.scrollHeight;

        fetch("{{ url_for('main.ask') }}", {
            method: "POST",
            headers: {
                "Content-Type": "application/x-www-form-urlencoded"
            },
            body: "question=" + encodeURIComponent(question)
        })
        .then(res => res.text())
        .then(answer => {
            const botMsg = document.createElement("div");
            botMsg.className = "bot-message";
            botMsg.textContent = answer;
            chatBox.appendChild(botMsg);

            chatBox.scrollTop = chatBox.scrollHeight;
        });

        input.value = "";
    });
</script>

{% endblock %}
