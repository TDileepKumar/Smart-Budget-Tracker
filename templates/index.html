{% extends "base.html" %}

{% block title %}Home{% endblock %}

{% block content %}

<style>
.home-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 75vh;
}

.home-card {
    max-width: 720px;
    width: 100%;
    padding: 40px;
    border-radius: 24px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    backdrop-filter: blur(18px);
    text-align: center;
}

.home-title {
    font-size: 40px;
    font-weight: 800;
    margin-bottom: 10px;
}

.home-sub {
    color: #cbd5e1;
    margin-bottom: 25px;
}

.home-buttons {
    display: flex;
    gap: 15px;
    justify-content: center;
}

.home-btn {
    padding: 12px 20px;
    border-radius: 14px;
    font-weight: 700;
    text-decoration: none;
}

.primary-btn {
    background: linear-gradient(135deg, #ff7f6a, #ff9a85);
    color: white;
}

.secondary-btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: white;
}
</style>

<div class="home-wrapper">

<div class="home-card">

    <div class="home-title">Smart Budget Tracker</div>

    <div class="home-sub">
        Track your income, control expenses, and manage budgets with a clean and modern interface.
    </div>

    <div class="home-buttons">
        <a href="{{ url_for('main.login') }}" class="home-btn primary-btn">Get Started</a>
        <a href="{{ url_for('main.signup') }}" class="home-btn secondary-btn">Create Account</a>
    </div>

</div>

</div>

{% endblock %}
