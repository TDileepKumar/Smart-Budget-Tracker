<!DOCTYPE html>
<html lang="en">

    <title>{% block title %}Smart Budget Tracker{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">Smart Budget Tracker</div>
        <div class="nav-links">
