{% extends "base.html" %}

{% block title %}Edit Transaction{% endblock %}

{% block content %}

<style>
.edit-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 75vh;
}

.edit-card {
    width: 420px;
    padding: 30px;
    border-radius: 20px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    backdrop-filter: blur(18px);
}

.edit-card h2 {
    text-align: center;
    margin-bottom: 20px;
}

.edit-card input,
.edit-card select {
    margin-bottom: 12px;
}

.edit-card button {
    width: 100%;
}
</style>

<div class="edit-wrapper">

<div class="edit-card">

<h2>Edit Transaction</h2>

{% if error_message %}
    <p style="color:#ff7f6a; text-align:center;">{{ error_message }}</p>
{% endif %}

<form method="POST">

    <input type="text" name="title" value="{{ transaction.title }}" required>

    <select name="type">
        <option value="income" {{ 'selected' if transaction.type == 'income' else '' }}>Income</option>
        <option value="expense" {{ 'selected' if transaction.type == 'expense' else '' }}>Expense</option>
    </select>

    <select name="category">
        {% for c in income_categories + expense_categories %}
            <option value="{{ c }}" {{ 'selected' if transaction.category == c else '' }}>
                {{ c }}
            </option>
        {% endfor %}
    </select>

    <input type="number" name="amount" value="{{ transaction.amount }}" required>

    <button type="submit">Update Transaction</button>

</form>

</div>

</div>

{% endblock %}
